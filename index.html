<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Using a font that closely resembles Fallout terminals -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --term-color: #1cfc03; /* Classic bright green Fallout color */
            --term-glow: 0 0 5px rgba(28, 252, 3, 0.6), 0 0 2px rgba(28, 252, 3, 0.4);
            --bg-color: #051405; /* Very dark green/black background */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'VT323', 'Courier New', monospace;
            color: var(--term-color);
            overflow: hidden; /* Prevent body scroll completely */
        }

        /* Container simulating the screen (Fixed bounds) */
        .crt-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            /* Light vignette for a convex screen effect */
            background: radial-gradient(circle at center, #081f08 0%, #000000 100%);
            overflow: hidden; /* Keep effects contained */
        }

        /* Inner container for content */
        .crt-content {
            position: relative;
            width: 100%;
            height: 100%;
            padding: clamp(1rem, 4vh, 3rem) clamp(1rem, 4vw, 3rem);
            overflow: hidden; /* Disabled internal scroll to prevent trapping mouse wheel on main site */
            text-shadow: var(--term-glow);
            /* Font size respects both width and height, ensuring it never overflows the container */
            font-size: clamp(12px, min(2.5vw, 4vh), 28px); 
            line-height: 1.2;
            text-transform: uppercase;
            z-index: 10;
        }

        /* Scanlines effect (Absolute, bounded by .crt-screen) */
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
        }

        /* Light flickering of the entire screen */
        .crt-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(28, 252, 3, 0.02);
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.01; }
            50% { opacity: 0.04; }
            100% { opacity: 0.01; }
        }

        /* Centered header */
        .header {
            text-align: center;
            margin-bottom: clamp(1rem, 3vh, 2rem);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .separator {
            overflow: hidden;
            white-space: nowrap;
            margin-top: 0.5rem;
        }

        /* Terminal body (left-aligned) */
        .terminal-body {
            text-align: left;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .status-line {
            min-height: 1.2em;
            margin-bottom: 0.2rem;
            display: none;
        }

        .main-message-container {
            margin-top: clamp(1rem, 2vh, 1.5rem);
            display: none;
        }

        /* Caret (cursor) */
        .cursor {
            display: inline-block;
            width: 0.6em;
            height: 1em;
            background-color: var(--term-color);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            box-shadow: var(--term-glow);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsiveness for very small screens */
        @media (max-width: 600px) {
            .header {
                text-align: left;
            }
            .crt-content {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="crt-screen">
        <div class="crt-content">
            <!-- STATIC HEADER -->
            <div class="header">
                <div>UX/UI INDUSTRIES UNIFIED OPERATION SYSTEM</div>
                <div>COPYRIGHT 1995-2026 VLADFROM35</div>
                <div>—Server 1, ver.1.01</div>
                <div class="separator">====================================================================================================</div>
            </div>

            <!-- ANIMATED SECTION -->
            <div class="terminal-body">
                <div id="status-terminal" class="status-line"></div>
                <div id="status-profile" class="status-line"></div>
                
                <div id="main-message-container" class="main-message-container">
                    <!-- ========================================================= -->
                    <!-- YOU CAN CHANGE THE FINAL TEXT IN THE data-text ATTRIBUTE HERE -->
                    <!-- ========================================================= -->
                    <span id="typewriter-text" data-text="HELLO, WAKE UP. MY NAME IS VLAD SYMONENKO. I DO COOL THINGS IN DESIGN"></span>
                    <span id="cursor" class="cursor"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Immediately invoked function to guarantee execution in iframes
        (function() {
            const statusTerminal = document.getElementById('status-terminal');
            const statusProfile = document.getElementById('status-profile');
            const mainMessageContainer = document.getElementById('main-message-container');
            const typewriterText = document.getElementById('typewriter-text');
            
            if (!statusTerminal || !typewriterText) return; // Safety check

            const finalMessage = typewriterText.getAttribute('data-text');

            const animateProgress = (element, prefixText, delayBeforeStart = 0) => {
                return new Promise(resolve => {
                    setTimeout(() => {
                        element.style.display = 'block';
                        let progress = 0;
                        
                        const interval = setInterval(() => {
                            const step = Math.floor(Math.random() * 8) + 1; 
                            progress += step;
                            
                            if (progress >= 100) {
                                progress = 100;
                                element.textContent = `${prefixText}...${progress}%`;
                                clearInterval(interval);
                                setTimeout(resolve, 400); 
                            } else {
                                element.textContent = `${prefixText}...${progress}%`;
                            }
                        }, 120); 
                    }, delayBeforeStart);
                });
            };

            const typeWriter = (element, text) => {
                return new Promise(resolve => {
                    mainMessageContainer.style.display = 'block';
                    let i = 0;
                    element.textContent = ''; 
                    
                    const type = () => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            i++;
                            const typeSpeed = Math.floor(Math.random() * 80) + 50;
                            setTimeout(type, typeSpeed);
                        } else {
                            resolve(); 
                        }
                    };
                    type();
                });
            };

            const runSequence = async () => {
                await animateProgress(statusTerminal, 'Terminal status', 500);
                await animateProgress(statusProfile, 'Profile status', 200);
                await new Promise(resolve => setTimeout(resolve, 1500));
                await typeWriter(typewriterText, finalMessage);
            };

            runSequence();
        })();
    </script>
</body>
</html>
